"1679826687505":
  alias: "[Notification] Checking for Home Keys"
  use_blueprint:
    path: homeassistant/confirmable_notification.yaml
    input:
      notify_device: e1059bf66f01175a37b5027341c07e2a
      title: Уходишь?
      message: Ключи взял?
      confirm_text: Взял
      dismiss_text: Ой, забыл
      dismiss_action:
        - service: notify.persistent_notification
          data:
            message: Азат забыл кючи

ask_to_unlock_main_door:
  alias: "[Notification] Ask to Unlock Main Door"
  use_blueprint:
    path: homeassistant/confirmable_notification.yaml
    input:
      notify_device: e1059bf66f01175a37b5027341c07e2a
      title: Should unlock Main Door
      message: Открыть основную дверь?
      confirm_text: 🚪✅ Открыть
      confirm_action:
        - service: lock.unlock
          metadata: {}
          data: {}
          target:
            entity_id: lock.main_door
      dismiss_text: 🚪❌ Нет
  description: ""
  icon: mdi:lock-open-alert-outline

ask_to_lock_main_door:
  alias: "[Notification] Ask to Lock Main Door"
  use_blueprint:
    path: homeassistant/confirmable_notification.yaml
    input:
      notify_device: e1059bf66f01175a37b5027341c07e2a
      title: Should lock Main Door
      message: Закрыть основную дверь?
      confirm_text: 🔒✅ Закрыть
      confirm_action:
        - service: lock.lock
          metadata: {}
          data: {}
          target:
            entity_id: lock.lock_febb
      dismiss_text: 🔒❌ Нет
  description: ""
  icon: mdi:lock-open-alert-outline
