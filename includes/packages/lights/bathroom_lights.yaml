bathroom_lights:
  timer:
    bathroom_light_turn_off:
      name: "Свет в ванной выключится через"
      duration: "00:03:00"

  template:
    - sensor:
        # ... (Brightness Schedule remains the same)
        - name: "Bathroom Light Brightness Schedule"
          default_entity_id: sensor.c_bathroom_light_brightness_schedule
          unique_id: c_bathroom_light_brightness_schedule
          state: >-
            {% set hour = now().hour %}
            {% if 5 <= hour < 21 %}
              230
            {% elif 21 <= hour < 23 %}
              192
            {% else %}
              99
            {% endif %}

        # =========================
        # COLOR TEMP SCHEDULE (FIXED FOR KELVIN)
        # =========================
        - name: "Bathroom Light Color Temp Schedule"
          default_entity_id: sensor.c_bathroom_light_color_temp_schedule
          unique_id: c_bathroom_light_color_temp_schedule
          state: >-
            {% set hour = now().hour %}
            {# Note: Higher Kelvin is cooler/whiter, Lower is warmer/yellow #}
            {% set min_k = state_attr('light.bathroom_lamp', 'min_color_temp_kelvin') | float(2000) %}
            {% set max_k = state_attr('light.bathroom_lamp', 'max_color_temp_kelvin') | float(6500) %}
            {% set range_k = max_k - min_k %}

            {% if 5 <= hour < 21 %}
              {{ (max_k - 0.2 * range_k) | round(0) }}
            {% elif 21 <= hour < 23 %}
              {{ (min_k + 0.3 * range_k) | round(0) }}
            {% else %}
              {{ min_k | round(0) }}
            {% endif %}

        # =========================
        # LIGHT ML MODEL (LOG PREDICTION)
        # =========================
        - name: "Bathroom LR Log Prediction"
          default_entity_id: sensor.c_bathroom_lr_log_prediction
          unique_id: c_bathroom_lr_log_prediction
          state: >-
            {{ state_attr('sun.sun','elevation') | float(0) * 0.01441 + 3.65051 }}

        # =========================
        # CORRECTION MODEL
        # =========================
        - name: "Bathroom Log Correction"
          default_entity_id: sensor.c_bathroom_log_correction
          unique_id: c_bathroom_log_correction
          state: >-
            {% set elev = state_attr('sun.sun','elevation') | float(0) %}
            {% set az = state_attr('sun.sun','azimuth') | float(0) %}

            {% if elev <= 13.745 %}
              -1.083
            {% else %}
              {% if az <= 135.287 %}
                -0.085
              {% elif elev <= 49.553 %}
                0.216
              {% else %}
                -0.055
              {% endif %}
            {% endif %}

        # =========================
        # FINAL LUX PREDICTION
        # =========================
        - name: "Bathroom Illuminance AI v1"
          default_entity_id: sensor.c_bathroom_lx_prediction
          unique_id: c_bathroom_lx_prediction
          unit_of_measurement: "lx"
          device_class: illuminance
          state: >-
            {% set elev = state_attr('sun.sun','elevation') | float(0) %}

            {% if elev <= 0 %}
              0
            {% else %}
              {% set lr = states('sensor.c_bathroom_lr_log_prediction') | float(0) %}
              {% set corr = states('sensor.c_bathroom_log_correction') | float(0) %}

              {{ (e ** (lr + corr) - 1) | round(2) }}
            {% endif %}

        # =========================
        # AI LIGHT MODEL v2
        # =========================
        - name: "Bathroom Illuminance Func AI v2"
          default_entity_id: sensor.c_bathroom_lx_func
          unique_id: c_bathroom_lx_func
          unit_of_measurement: "lx"
          state: >-
            {% set elev = state_attr('sun.sun','elevation') | float(0) %}
            {% set az = state_attr('sun.sun','azimuth') | float(0) %}
            {% set cloud = state_attr('weather.forecast_tegel_home','cloud_coverage') | float(0) %}

            {% set door = 1 if is_state('binary_sensor.0x00158d0006e4e280_contact','on') else 0 %}

            {% set weather = states('weather.forecast_tegel_home') %}

            {% set cloudy = 1 if weather == 'cloudy' else 0 %}
            {% set partly = 1 if weather == 'partlycloudy' else 0 %}
            {% set rainy = 1 if weather == 'rainy' else 0 %}
            {% set sunny = 1 if weather == 'sunny' else 0 %}

            {% set x =
              elev * -0.28256257505674626 +
              az * -0.012541141050843814 +
              cloud * 0.029587416540465414 +
              door * 0.09654319664050931 +
              cloudy * -0.758920253038008 +
              partly * 0 +
              rainy * 1.1918680896075657 +
              sunny * 1.0671404452982214 +
              1 * 3.8438701283568815
            %}

            {{ (1 / (1 + e ** (-x))) | round(4) }}

    - switch:
        - name: "Bathroom Light Auto Off"
          default_entity_id: switch.c_bathroom_light_auto_off
          unique_id: c_bathroom_light_auto_off

          state: >
            {{ is_state('automation.bathroom_lights_turn_off_light_if_there_is_no_movements', 'on') }}

          turn_on:
            - service: automation.turn_on
              target:
                entity_id: automation.bathroom_lights_turn_off_light_if_there_is_no_movements

          turn_off:
            - service: automation.turn_off
              target:
                entity_id: automation.bathroom_lights_turn_off_light_if_there_is_no_movements

    - light:
        - name: "[Bathroom] Light"
          default_entity_id: light.c_bathroom
          icon: mdi:light-recessed
          state: >-
            {{ is_state('switch.bathroom_light_switch', 'on') and is_state('light.bathroom_lamp', 'on') }}
          supports_transition: True
          turn_on:
            - action: switch.turn_on
              target:
                entity_id: switch.bathroom_light_switch
            - action: light.turn_on
              target:
                entity_id: light.bathroom_lamp
          turn_off:
            - action: light.turn_off
              target:
                entity_id: light.bathroom_lamp
            - action: switch.turn_off
              target:
                entity_id: switch.bathroom_light_switch

          set_level:
            - action: light.turn_on
              target:
                entity_id: light.bathroom_lamp
              data:
                brightness: "{{ brightness }}"

          # WORKAROUND: Template Light expects 'temperature' in mireds,
          # but we use 'color_temp_kelvin' for the action.
          set_temperature:
            - action: light.turn_on
              target:
                entity_id: light.bathroom_lamp
              data:
                color_temp_kelvin: "{{ color_temp_kelvin }}"
                brightness: "{{ brightness if brightness is defined else none }}"

          level: "{{ state_attr('light.bathroom_lamp', 'brightness') }}"

          # MANDATORY CONVERSIONS FOR TEMPLATE COMPATIBILITY:
          # Mireds = 1,000,000 / Kelvin
          temperature: >-
            {% set k = state_attr('light.bathroom_lamp', 'color_temp_kelvin') | float(0) %}
            {{ (1000000 / k) | round(0) if k > 0 else 0 }}

          min_mireds: >-
            {% set k = state_attr('light.bathroom_lamp', 'max_color_temp_kelvin') | float(0) %}
            {{ (1000000 / k) | round(0) if k > 0 else 153 }}

          max_mireds: >-
            {% set k = state_attr('light.bathroom_lamp', 'min_color_temp_kelvin') | float(0) %}
            {{ (1000000 / k) | round(0) if k > 0 else 500 }}

  automation:
    - alias: "[Bathroom Lights] Turn on light if there is movement"
      trigger:
        - platform: state
          entity_id: binary_sensor.bathroom_presence_sensor_occupancy
          to: "on"
        - platform: state
          entity_id: binary_sensor.bathroom_motion_sensor_occupancy
          to: "on"
        - platform: state
          entity_id: sensor.bathroom_motion_sensor_illuminance
      condition:
        - condition: or
          conditions:
            - condition: numeric_state
              entity_id: sensor.bathroom_motion_sensor_illuminance
              below: 50
            - condition: numeric_state
              entity_id: sensor.c_sun_elevation
              below: 2
        - condition: or
          conditions:
            - condition: state
              entity_id: binary_sensor.bathroom_presence_sensor_occupancy
              state: "on"
            - condition: state
              entity_id: binary_sensor.bathroom_motion_sensor_occupancy
              state: "on"
      action:
        - service: light.turn_on
          target:
            entity_id: light.c_bathroom

    - alias: "[Bathroom Lights] Turn off light if there is no movements"
      trigger:
        - platform: state
          entity_id: binary_sensor.bathroom_presence_sensor_occupancy
          to: "off"
          for: "00:01:00"
        - platform: state
          entity_id: binary_sensor.bathroom_motion_sensor_occupancy
          to: "off"
          for: "00:00:00"
        - platform: event
          event_type: timer.finished
          event_data:
            entity_id: timer.bathroom_light_turn_off
      condition:
        - condition: state
          entity_id: binary_sensor.bathroom_presence_sensor_occupancy
          state: "off"
        - condition: state
          entity_id: binary_sensor.bathroom_motion_sensor_occupancy
          state: "off"
      action:
        - service: light.turn_off
          target:
            entity_id: light.c_bathroom

    - alias: "[Bathroom Lights] Start timer if light turned on manually"
      trigger:
        - platform: state
          entity_id: light.c_bathroom
          to: "on"
      condition:
        condition: state
        entity_id: binary_sensor.bathroom_presence_sensor_occupancy
        state: "off"
      action:
        - service: timer.cancel
          target:
            entity_id: timer.bathroom_light_turn_off
        - service: timer.start
          target:
            entity_id: timer.bathroom_light_turn_off

    - alias: "[Bathroom Lights] Cancel timer if there is movement"
      trigger:
        - platform: state
          entity_id: binary_sensor.bathroom_presence_sensor_occupancy
          to: "on"
        - platform: state
          entity_id: binary_sensor.bathroom_motion_sensor_occupancy
          to: "on"
        - platform: state
          entity_id: light.c_bathroom
          to: "off"
      action:
        - service: timer.cancel
          target:
            entity_id: timer.bathroom_light_turn_off

    - alias: "[Bathroom Lights] Fix Main Light"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: input_select.c_livingroom_light_mode
          to: "normal"
        - platform: state
          entity_id: light.c_bathroom
          to: "on"
        - platform: state
          entity_id: sensor.c_bathroom_light_brightness_schedule
        - platform: state
          entity_id: sensor.c_bathroom_light_color_temp_schedule
        - platform: time_pattern
          minutes: "/10"
      condition:
        - condition: state
          entity_id: light.c_bathroom
          state: "on"
        - condition: not
          conditions:
            - condition: state
              entity_id: input_select.c_livingroom_light_mode
              state: "saloon"
      action:
        - action: light.turn_on
          target:
            entity_id: light.bathroom_lamp
          data:
            brightness: "{{ states('sensor.c_bathroom_light_brightness_schedule') }}"
            color_temp_kelvin: "{{ states('sensor.c_bathroom_light_color_temp_schedule') }}"
            transition: 5
