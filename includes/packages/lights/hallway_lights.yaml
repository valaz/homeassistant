hallway_lights:
  timer:
    hallway_light_turn_off:
      name: "Входной свет выключится через "
      duration: "00:02:00"

  template:
    - binary_sensor:
        - name: "Hallway Carpet Usage"
          default_entity_id: binary_sensor.c_hallway_carpet_usage
          device_class: motion
          delay_off:
            seconds: 10
          state: >
            {{ states('binary_sensor.hallway_push_sensor_contact') == 'off' }}

    - sensor:
        - name: "Hallway Light Brightness Schedule"
          default_entity_id: sensor.c_hallway_light_brightness_schedule
          state: >
            {% set hour = now().hour %}
            {% if 5 <= hour < 21 %}
              230
            {% elif 21 <= hour < 23 %}
              192
            {% else %}
              123
            {% endif %}

        - name: "Hallway Light Color Temp Schedule"
          default_entity_id: sensor.c_hallway_light_color_temp_schedule
          state: >
            {% set hour = now().hour %}
            {% set light = 'light.hallway' %}
            {# Kelvin: Min is Warm (~2000), Max is Cold (~6500) #}
            {% set min_k = state_attr(light, 'min_color_temp_kelvin') | float(2000) %}
            {% set max_k = state_attr(light, 'max_color_temp_kelvin') | float(6500) %}
            {% set range_k = max_k - min_k %}

            {% if 5 <= hour < 21 %}
              {# Day: Neutral #}
              {{ (min_k + 0.7 * range_k) | round(0) }}
            {% elif 21 <= hour < 23 %}
              {# Evening: Warmer #}
              {{ (min_k + 0.3 * range_k) | round(0) }}
            {% else %}
              {# Night: Warmest #}
              {{ (min_k + 0.1 * range_k) | round(0) }}
            {% endif %}

  automation:
    - alias: "[Hallway Lights] Fix Main Light"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: input_select.c_livingroom_light_mode
          to: "normal"
        - platform: state
          entity_id: light.hallway
          to: "on"
        - platform: state
          entity_id: sensor.c_hallway_light_brightness_schedule
        - platform: state
          entity_id: sensor.c_hallway_light_color_temp_schedule
        - platform: time_pattern
          minutes: "/10"
      condition:
        - condition: state
          entity_id: light.hallway
          state: "on"
        - condition: state
          entity_id: input_select.c_livingroom_light_mode
          state: "normal"
      action:
        - action: light.turn_on
          target:
            entity_id: light.hallway
          data:
            brightness: "{{ states('sensor.c_hallway_light_brightness_schedule') }}"
            color_temp_kelvin: "{{ states('sensor.c_hallway_light_color_temp_schedule') }}"
            transition: 10

    - alias: "[Hallway Lights] Turn on light when door is open"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.hallway_door_sensor_contact
          to: "on"
        - platform: state
          entity_id: sensor.c_hallway_carpet_usage
          to: "on"
      condition:
        - condition: state
          entity_id: light.hallway
          state: "off"
      action:
        - action: timer.cancel
          target:
            entity_id: timer.hallway_light_turn_off
        - action: timer.start
          target:
            entity_id: timer.hallway_light_turn_off
        - action: light.turn_on
          target:
            entity_id: light.hallway

    - alias: "[Hallway Lights] Turn off light when timer is finished"
      mode: restart
      initial_state: true
      trigger:
        - platform: event
          event_type: timer.finished
          event_data:
            entity_id: timer.hallway_light_turn_off
      condition:
        - condition: state
          entity_id: input_select.c_livingroom_light_mode
          state: "normal"
      action:
        - action: light.turn_off
          target:
            entity_id: light.hallway

    - alias: "[Hallway Lights] Turn on in the evening"
