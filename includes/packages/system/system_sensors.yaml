system_sensors:
  recorder:
    db_url: !secret db_link
    purge_keep_days: 7
    auto_purge: true
    exclude:
      domains:
        - camera
      entity_globs:
        - sensor.docker_*
        - switch.docker_*
        - sensor.uptimekuma_*
        - binary_sensor.uptimekuma_*
  #   include:
  #     entities:
  #       - binary_sensor.rpi_power_status
  #       - sensor.processor_use
  #       - sensor.disk_use_percent
  #       - sensor.memory_use_percent
  #       - sensor.disk_free
  #       - sensor.processor_temperature
  #       - sensor.home_assistant_v2_db
  #       - sensor.maria_db

  homeassistant:
    customize:
      sensor.processor_use:
        friendly_name: Загрузка процессора
      sensor.disk_use_percent:
        friendly_name: Использование диска
      sensor.disk_free:
        friendly_name: Свободно на диске
      sensor.processor_temperature:
        friendly_name: Температура процессора
      sensor.memory_use_percent:
        friendly_name: Использование ОЗУ
      sensor.home_assistant_v2_db:
        friendly_name: Объем базы HA
      sensor.maria_db:
        friendly_name: Объем базы Maria DB
      sensor.online_custom:
        friendly_name: Home Assistant в онлайне
      sensor.last_boot_custom:
        friendly_name: Сервер в онлайне
      sensor.custom_time:
        friendly_name: Текущее время

  alert:
    hulk_high_disk_usage:
      name: "Высокая загрузка диска на Hulk"
      message: "⚠️💾 Высокое использование диска на Hulk: {{ states('sensor.disk_use_percent') }}%"
      done_message: "✅💾 Использование диска на Hulk снизилось: {{ states('sensor.disk_use_percent') }}%"
      entity_id: binary_sensor.c_hulk_high_disk_usage
      state: "on"
      repeat: 60
      can_acknowledge: true
      skip_first: false
      notifiers:
        - tg_valaz

  template:
    - binary_sensor:
        - name: "Hulk High Disk Usage"
          default_entity_id: binary_sensor.c_hulk_high_disk_usage
          unique_id: c_hulk_high_disk_usage
          state: >
            {{ states('sensor.disk_use_percent') | float(0) > 85 }}

    - sensor:
        - name: "Server Uptime"
          default_entity_id: sensor.c_server_uptime
          unique_id: c_uptime_server
          icon: mdi:clock-time-two-outline
          state: >
            {% set last_boot = states('sensor.last_boot') | as_datetime %}
            {% if last_boot %}
              {{ now() - last_boot }}
            {% else %}
              unknown
            {% endif %}

        - name: "System Uptime"
          default_entity_id: sensor.c_system_uptime
          unique_id: c_uptime_system
          icon: mdi:clock-time-two-outline
          state: >
            {% set online = states('sensor.online') | as_datetime %}
            {% if online %}
              {{ now() - online }}
            {% else %}
              unknown
            {% endif %}

        - name: "Custom Time"
          default_entity_id: sensor.c_custom_time
          unique_id: c_custom_time
          state: >
            {{ now().strftime("%H:%M:%S") }}

        - name: "Online Custom"
          default_entity_id: sensor.c_online_custom
          unique_id: c_online_custom
          state: >
            {% set s = (as_timestamp(now()) - as_timestamp(states('sensor.online'))) | int(0) %}
            {{ '%d d %02d:%02d:%02d' | format(s//86400, (s%86400)//3600, (s%3600)//60, s%60) }}

        - name: "Last Boot Custom"
          default_entity_id: sensor.c_last_boot_custom
          unique_id: c_last_boot_custom
          state: >
            {% set s = (as_timestamp(now()) - as_timestamp(states('sensor.last_boot'))) | int(0) %}
            {{ '%d d %02d:%02d:%02d' | format(s//86400, (s%86400)//3600, (s%3600)//60, s%60) }}

    - trigger:
        - platform: time_pattern
          seconds: "/30"

      sensor:
        - name: "Time Tick"
          default_entity_id: sensor.c_time_1_sec
          unique_id: c_time_1_sec
          state: "{{ as_timestamp(now()) | round(0) }}"
