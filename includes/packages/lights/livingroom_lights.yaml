livingroom_lights:
  input_select:
    c_livingroom_light_mode:
      name: "Режим освещения"
      options:
        - normal
        - video
        - saloon
        - relax
        - cinema
        - gaming

  template:
    - sensor:
        - name: "Livingroom Light Brightness Schedule"
          default_entity_id: sensor.c_livingroom_light_brightness_schedule
          state: >
            {% set hour = now().hour %}
            {% if 5 <= hour < 21 %}
              230
            {% elif 21 <= hour < 23 %}
              192
            {% else %}
              123
            {% endif %}

        - name: "Livingroom Light Color Temp Schedule"
          default_entity_id: sensor.c_livingroom_light_color_temp_schedule
          state: >
            {% set hour = now().hour %}
            {% set light = 'light.livingroom' %}
            {# Kelvin: Low is Warm (~2000), High is Cold (~6500) #}
            {% set min_k = state_attr(light, 'min_color_temp_kelvin') | float(2000) %}
            {% set max_k = state_attr(light, 'max_color_temp_kelvin') | float(6500) %}
            {% set range_k = max_k - min_k %}

            {% if 5 <= hour < 21 %}
              {# Day: Neutral/Cool #}
              {{ (min_k + 0.5 * range_k) | round(0) }}
            {% elif 21 <= hour < 23 %}
              {# Evening: Warm #}
              {{ (min_k + 0.3 * range_k) | round(0) }}
            {% else %}
              {# Night: Warmest #}
              {{ (min_k + 0.1 * range_k) | round(0) }}
            {% endif %}

  automation:
    - alias: "[Livingroom Lights] Toggle Main Light"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.livingroom_light_switch_action
          to: "single_left"
      action:
        - action: light.toggle
          target:
            entity_id: light.livingroom

    - alias: "[Livingroom Lights] Toggle Ambilight + Hue"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.livingroom_light_switch_action
          to: "single_right"
      action:
        - action: switch.toggle
          target:
            entity_id: switch.c_65oled936_12_ambilight_hue

    - alias: "[Livingroom Lights] Fix Main Light"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: input_select.c_livingroom_light_mode
          to: "normal"
        - platform: state
          entity_id: light.livingroom
          to: "on"
        - platform: state
          entity_id: sensor.c_livingroom_light_brightness_schedule
        - platform: state
          entity_id: sensor.c_livingroom_light_color_temp_schedule
        - platform: time_pattern
          minutes: "/10"
      condition:
        - condition: state
          entity_id: light.livingroom
          state: "on"
        - condition: state
          entity_id: input_select.c_livingroom_light_mode
          state: "normal"
      action:
        - action: light.turn_on
          target:
            entity_id: light.livingroom
          data:
            brightness: "{{ states('sensor.c_livingroom_light_brightness_schedule') }}"
            color_temp_kelvin: "{{ states('sensor.c_livingroom_light_color_temp_schedule') }}"
            transition: 10

    - alias: "[Livingroom Lights] Turn ON saloon mode"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.livingroom_light_switch_action
          to: "double_left"
      action:
        - action: input_select.select_option
          target:
            entity_id: input_select.c_livingroom_light_mode
          data:
            option: normal
        - action: input_select.select_option
          target:
            entity_id: input_select.c_livingroom_light_mode
          data:
            option: saloon

    - alias: "[Livingroom Lights] Turn ON relax mode"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.livingroom_light_switch_action
          to: "double_right"
      action:
        - action: input_select.select_option
          target:
            entity_id: input_select.c_livingroom_light_mode
          data:
            option: normal
        - delay: "00:00:03"
        - action: input_select.select_option
          target:
            entity_id: input_select.c_livingroom_light_mode
          data:
            option: relax

    - alias: "[Livingroom Lights] Turn ON normal mode"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: light.livingroom
          to: "off"
          for: "00:00:05"
      action:
        - action: input_select.select_option
          target:
            entity_id: input_select.c_livingroom_light_mode
          data:
            option: normal
