fritzbox:
  template:
    - sensor:
        - name: "Fritz Box 6660 Cable Upload Throughput Mbs"
          default_entity_id: sensor.c_fritz_box_6660_cable_upload_throughput_mbs
          unit_of_measurement: "Mbit/s"
          device_class: data_rate
          state_class: measurement
          icon: mdi:upload
          state: >-
            {{ (states('sensor.fritz_box_6660_cable_upload_throughput') | float(0) / 125) | round(2) }}
          availability: >-
            {{ is_number(states('sensor.fritz_box_6660_cable_upload_throughput')) }}

        - name: "Fritz Box 6660 Cable Download Throughput Mbs"
          default_entity_id: sensor.c_fritz_box_6660_cable_download_throughput_mbs
          unit_of_measurement: "Mbit/s"
          device_class: data_rate
          state_class: measurement
          icon: mdi:download
          state: >-
            {{ (states('sensor.fritz_box_6660_cable_download_throughput') | float(0) / 125) | round(2) }}
          availability: >-
            {{ is_number(states('sensor.fritz_box_6660_cable_download_throughput')) }}

  automation:
    - alias: "[Fritzbox] Repower router if connection lost"
      mode: single
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.google_com
          to: "off"
          for: "00:01:10"
      action:
        - service: script.send_sms_to_azat
          data:
            message: "🔄 Роутер в гостиной будет перезагружен, так как пропала связь"
        - delay:
            seconds: 60
        - service: switch.turn_off
          target:
            entity_id: switch.livingroom_router
        - delay:
            seconds: 5
        - service: switch.turn_on
          target:
            entity_id: switch.livingroom_router

    - alias: "[Fritzbox] Nightly Restart"
      trigger:
        platform: time
        at: "04:00:00"
      condition:
        condition: time
        weekday:
          - mon
          - tue
          - wed
          - thu
          - fri
          - sat
          - sun
      action:
        - service: button.press
          target:
            entity_id: button.fritz_box_6660_cable_reboot

    - alias: "[Fritzbox] Switch Wi-Fi if unavailable"
      trigger:
        - platform: state
          entity_id: binary_sensor.c_hass_wifi_connected
          to: "off"
          for: "00:00:05"
      action:
        - service: switch.turn_off
          target:
            entity_id: switch.fritz_box_6660_cable_wi_fi_aeki_5ghz
        - service: switch.turn_off
          target:
            entity_id: switch.fritz_box_6660_cable_wi_fi_aeki_g
        - service: switch.turn_on
          target:
            entity_id: switch.fritz_box_6660_cable_wi_fi_aeki_5ghz
        - service: switch.turn_on
          target:
            entity_id: switch.fritz_box_6660_cable_wi_fi_aeki_g

    - alias: "[Fritzbox] Daily router cleanup"
      mode: single
      initial_state: true
      trigger:
        - platform: time
          at: "05:00:00"
      action:
        - service: button.press
          target:
            entity_id: button.fritz_box_6660_cable_cleanup
