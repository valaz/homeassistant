hallway_tedee_lock:
  timer:
    hallway_door_pull_spring:
      name: "Запущено открытие двери"
      duration: "00:00:03"

    hallway_door_azat_auto_open:
      name: "Автооткрытие двери для Азата"
      duration: "00:03:33"

  template:
    - binary_sensor:
        - name: "Should Open Main Door"
          default_entity_id: binary_sensor.c_should_open_main_door
          unique_id: c_should_open_main_door
          state: >
            {% set now_ts = as_timestamp(now()) %}
            {% set z_last = as_timestamp(states.lock.z_intercom.last_changed) %}
            {% set r_last = as_timestamp(states.lock.r_intercom.last_changed) %}

            {{ is_state('person.azat','home') }}
        - name: "Intercom Changed Recently"
          default_entity_id: binary_sensor.c_intercom_changed_recently
          unique_id: c_intercom_changed_recently
          state: >
            {% set now_ts = as_timestamp(now()) %}
            {% set z_last = as_timestamp(states.lock.z_intercom.last_changed) %}
            {% set r_last = as_timestamp(states.lock.r_intercom.last_changed) %}

            {{
              (now_ts - z_last < 300)
              or (now_ts - r_last < 300)
            }}
    - lock:
        - name: Main Door
          unique_id: c_hallway_main_door
          lock:
            - target:
                entity_id:
                  - lock.lock_febb
              action: lock.lock
          unlock:
            - action: script.main_door_try_unlock
            - if:
                - condition: state
                  entity_id:
                    - binary_sensor.c_should_open_main_door
                  state: "on"
                  match: all
              then:
                - action: script.main_door_try_open
              else:
                - data:
                    message: Дверь разблокирована, но не откроется
                  action: notify.mobile_app_iphone_15_az
            - target:
                entity_id:
                  - timer.hallway_door_pull_spring
              action: timer.start
          optimistic: false
          state:
            "{{ is_state('lock.lock_febb', 'locked') or is_state('timer.hallway_door_pull_spring',
            'idle') }}"

  script:
    main_door_try_unlock:
      alias: "[Door Lock] Try to unlock"
      sequence:
        - if:
            - condition: template
              value_template: "{{ is_state('lock.lock_febb', 'locked') or is_state('binary_sensor.lock_febb_semi_locked', 'on')}}"
          then:
            - service: lock.unlock
              target:
                entity_id: lock.lock_febb

    main_door_try_open:
      alias: "[Door Lock] Try to open"
      sequence:
        - wait_template: "{{ is_state('lock.lock_febb', 'unlocked') and is_state('binary_sensor.lock_febb_semi_locked', 'off') }}"
          timeout: 5
          continue_on_timeout: false
        - service: lock.open
          target:
            entity_id: lock.lock_febb

  automation:
    - alias: "[Main Door Lock] Unlock from mobile"
      mode: restart
      initial_state: true
      trigger:
        - platform: event
          event_type: ios.action_fired
          event_data:
            actionID: 19A87280-525B-4C18-90B3-8F1E39A347A7
      action:
        - service: lock.unlock
          target:
            entity_id: lock.main_door

    - alias: "[Main Door Lock] Auto Unlock for Azat"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: person.azat
          from: "not_home"
          to: "home"
      condition:
        - condition: time
          after: "08:00:00"
          before: "22:00:00"
        # - condition: state
        #   entity_id: person.eliia
        #   state: "home"
        - condition: state
          entity_id: binary_sensor.hallway_door_sensor_contact
          state: "off"
        - condition: state
          entity_id: binary_sensor.c_intercom_changed_recently
          state: "on"
        - condition: template
          value_template: "{{ (as_timestamp(now()) - as_timestamp(states.lock.main_door.last_changed)) > 60 }}"
      action:
        # - wait_template: "{{ is_state('binary_sensor.hallway_external_motion_sensor_occupancy', 'on') }}"
        #   timeout: 10
        #   continue_on_timeout: false
        - service: lock.unlock
          target:
            entity_id: lock.lock_febb
        - action: notify.send_message
          target:
            entity_id: notify.tg_bot_valaz
          data:
            message: "🔒 Замок разблокировался, так как Азат пришел"
        - service: script.send_sms_to_azat
          data:
            message: "🔒 Замок разблокировался, так как Азат пришел"

    - alias: "[Main Door Lock] Auto Open for Azat"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: person.azat
          from: "not_home"
          to: "home"
      condition:
        - condition: time
          after: "08:00:00"
          before: "22:00:00"
        - condition: state
          entity_id: binary_sensor.hallway_door_sensor_contact
          state: "off"
        - condition: state
          entity_id: binary_sensor.c_intercom_changed_recently
          state: "on"
        - condition: template
          value_template: "{{ (as_timestamp(now()) - as_timestamp(states.lock.main_door.last_changed)) > 60 }}"
        - condition: state
          entity_id: timer.hallway_door_azat_auto_open
          state: "active"
      action:
        - wait_template: "{{ is_state('binary_sensor.hallway_external_motion_sensor_occupancy', 'on') }}"
          timeout: 10
          continue_on_timeout: false
        - service: lock.unlock
          target:
            entity_id: lock.lock_febb
        - action: notify.send_message
          target:
            entity_id: notify.tg_bot_valaz
          data:
            message: "🔒 Замок разблокировался, так как Азат подошел"

    - alias: "[Main Door Lock] Autolock if no people at home"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.c_people_at_home
          to: "off"
          for: "00:01:00"
      action:
        - service: lock.lock
          target:
            entity_id: lock.lock_febb
        - action: notify.send_message
          target:
            entity_id: notify.tg_bot_valaz
          data:
            message: "🔒 Дверь закрывается, так как никого нет дома"
        - service: script.send_sms_to_azat
          data:
            message: "🔒 Дверь закрывается, так как никого нет дома"

    - alias: "[Main Door Lock] Fix Semilock"
      mode: restart
      initial_state: true
      triggers:
        trigger: state
        entity_id: binary_sensor.lock_febb_semi_locked
        to: "on"
        for: "00:01:00"
      conditions:
        - condition: state
          entity_id: binary_sensor.c_people_at_home
          state: "on"
      action:
        - service: lock.unlock
          target:
            entity_id: lock.lock_febb

    - alias: "[Main Door Lock] Fix Semilock by Door"
      mode: restart
      initial_state: true
      triggers:
        trigger: state
        entity_id: binary_sensor.hallway_door_sensor_contact
        from: "on"
        to: "off"
        for: "00:00:10"
      conditions:
        - condition: state
          entity_id: binary_sensor.lock_febb_semi_locked
          state: "on"
      action:
        - service: lock.unlock
          target:
            entity_id: lock.lock_febb
