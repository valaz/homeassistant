bedroom_lights:
  homeassistant:
    customize:
      light.yeelight_lamp15_0x1c03268c:
        friendly_name: "[Bedroom] Monitor Lamp"
        icon: mdi:desk-lamp

      light.yeelight_lamp15_0x1c03268c_ambilight:
        friendly_name: "[Bedroom] Monitor Ambilight"
        icon: mdi:television-ambient-light

  template:
    - binary_sensor:
        - name: "Bedroom Monitor Display"
          default_entity_id: binary_sensor.c_bedroom_monitor_display
          device_class: power
          state: >-
            {{ states('sensor.bedroom_monitor_plug_power') | float(0) > 20 }}

    - sensor:
        # =========================
        # MAIN MONITOR BRIGHTNESS
        # =========================
        - name: "Bedroom Monitor Light Brightness Schedule"
          default_entity_id: sensor.c_bedroom_monitor_light_brightness_schedule
          state: >-
            {% set hour = now().hour %}
            {% if 5 <= hour < 21 %}
              234
            {% elif 21 <= hour < 23 %}
              210
            {% else %}
              123
            {% endif %}

        # =========================
        # MAIN MONITOR COLOR TEMP
        # =========================
        - name: "Bedroom Monitor Light Color Temp Schedule"
          default_entity_id: sensor.c_bedroom_monitor_light_color_temp_schedule
          state: >-
            {% set hour = now().hour %}
            {% set min_temp = state_attr('light.yeelight_lamp15_0x1c03268c', 'min_mireds') | float(0) %}
            {% set max_temp = state_attr('light.yeelight_lamp15_0x1c03268c', 'max_mireds') | float(0) %}
            {% set base = max_temp - min_temp %}

            {% if 5 <= hour < 20 %}
              {{ (0.3 * base + min_temp) | round(0) }}
            {% elif 20 <= hour < 22 %}
              {{ (0.6 * base + min_temp) | round(0) }}
            {% else %}
              {{ (0.9 * base + min_temp) | round(0) }}
            {% endif %}

        # =========================
        # AMBILIGHT BRIGHTNESS
        # =========================
        - name: "Bedroom Monitor Ambilight Brightness Schedule"
          default_entity_id: sensor.c_bedroom_monitor_ambilight_brightness_schedule
          state: >-
            {% set hour = now().hour %}
            {% if 5 <= hour < 21 %}
              255
            {% elif 21 <= hour < 23 %}
              210
            {% else %}
              149
            {% endif %}

        # =========================
        # AMBILIGHT RGB LOGIC
        # =========================
        - name: "Bedroom Monitor Ambilight RGB Calc"
          default_entity_id: sensor.c_bedroom_monitor_ambilight_rgb_calc
          state: >-
            {% set efficiency = states('input_number.c_rescuetime_efficiency_percent') | float(100) %}

            {% if efficiency < 50 %}
              [214, 24, 0]
            {% else %}
              [110, 224, 62]
            {% endif %}
    - light:
        - name: "[Bedroom] Light"
          default_entity_id: light.c_bedroom
          state: "{{ is_state('switch.bedroom_light_switch', 'on') }}"
          turn_on:
            - data:
                entity_id: switch.bedroom_light_switch
              action: switch.turn_on
          turn_off:
            - data:
                entity_id: switch.bedroom_light_switch
              action: switch.turn_off
          icon: mdi:light-recessed

  automation:
    - alias: "[Bedroom Lights] Toggle Main Light"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.bedroom_light_switch_action
          to: "single"
      action:
        - service: switch.toggle
          entity_id: switch.bedroom_light_switch

    - alias: "[Bedroom Lights] Toggle Desk Lamp"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: sensor.bedroom_light_switch_action
          to: "double"
      action:
        - service: light.toggle
          entity_id: light.yeelight_lamp15_0x1c03268c

    - alias: "[Bedroom Lights] Turn Off Monitor Lamp"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.c_bedroom_monitor_display
          to: "off"
          for: "00:00:10"
      action:
        - service: light.turn_off
          entity_id: light.yeelight_lamp15_0x1c03268c
        - service: light.turn_off
          entity_id: light.yeelight_lamp15_0x1c03268c_ambilight

    - alias: "[Bedroom Lights] Turn On Monitor Lamp"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.c_bedroom_monitor_display
          to: "on"
      action:
        - service: light.turn_on
          entity_id: light.yeelight_lamp15_0x1c03268c

    - alias: "[Bedroom Lights] Turn On Monitor Ambilight"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: light.yeelight_lamp15_0x1c03268c
          to: "on"
      condition:
        - condition: numeric_state
          entity_id: sun.sun
          attribute: elevation
          below: 0
      action:
        - service: light.turn_on
          entity_id: light.yeelight_lamp15_0x1c03268c_ambilight

    - alias: "[Bedroom Lights] Fix Monitor Lamp Light"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: light.yeelight_lamp15_0x1c03268c
          to: "on"
        - platform: state
          entity_id: sensor.c_bedroom_monitor_light_brightness_schedule
        - platform: state
          entity_id: sensor.c_bedroom_monitor_light_color_temp_schedule
        - platform: time_pattern
          minutes: "/5"
      condition:
        - condition: state
          entity_id: light.yeelight_lamp15_0x1c03268c
          state: "on"
      action:
        - service: light.turn_on
          entity_id: light.yeelight_lamp15_0x1c03268c
          data_template:
            brightness: >
              {{ states('sensor.c_bedroom_monitor_light_brightness_schedule') }}
            color_temp: >
              {{ states('sensor.c_bedroom_monitor_light_color_temp_schedule') }}
            transition: 5

    - alias: "[Bedroom Lights] Fix Monitor Lamp Ambilight"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: light.yeelight_lamp15_0x1c03268c_ambilight
          to: "on"
        - platform: state
          entity_id: sensor.c_bedroom_monitor_ambilight_brightness_schedule
        - platform: state
          entity_id: sensor.c_bedroom_monitor_ambilight_rgb_calc
        - platform: time_pattern
          minutes: "/5"
      condition:
        - condition: state
          entity_id: light.yeelight_lamp15_0x1c03268c_ambilight
          state: "on"
      action:
        - service: light.turn_on
          entity_id: light.yeelight_lamp15_0x1c03268c_ambilight
          data_template:
            brightness: >
              {{ states('sensor.c_bedroom_monitor_ambilight_brightness_schedule') }}
            rgb_color: >
              {{ states('sensor.c_bedroom_monitor_ambilight_rgb_calc') }}
            transition: 5
