hallway_ring_intercom:
  timer:
    hallway_intercom_autoopen_timer:
      name: "Автооткрытие подъезда"
      duration: "00:05:00"

  template:
    binary_sensor:
      - name: "Ring Intercom Ding Detected"
        unique_id: c_ring_intercom_ding
        icon: mdi:bell-ring-outline
        device_class: sound

        state: >
          {% set last_event = states('event.ring_intercom_ding') %}
          {% set last_ts = state_attr('event.ring_intercom_ding','timestamp') %}

          {% if last_ts is not none %}
            {% set age = as_timestamp(now()) - as_timestamp(last_ts) %}
            {{ age < 120 }}
          {% else %}
            {{ this.state | default('off') }}
          {% endif %}

    switch:
      - name: "Intercom Autoopen"
        default_entity_id: switch.c_intercom_autoopen
        icon: mdi:door-open
        state: >
          {{ states('timer.hallway_intercom_autoopen_timer') != 'idle' }}
        turn_on:
          - service: timer.start
            target:
              entity_id: timer.hallway_intercom_autoopen_timer
        turn_off:
          - service: timer.cancel
            target:
              entity_id: timer.hallway_intercom_autoopen_timer

    lock:
      - unique_id: r_intercom
        name: R Intercom
        lock:
          - target:
              entity_id:
                - switch.c_intercom_autoopen
            action: switch.turn_off
        unlock:
          - target:
              entity_id:
                - switch.c_intercom_autoopen
            action: switch.turn_on
        optimistic: false
        state: "{{ is_state('switch.c_intercom_autoopen', 'off') }}"

  automation:
    - alias: "[Ring Intercom] Autoopen"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.c_ring_intercom_ding
          to: "on"
        - platform: state
          entity_id: lock.r_intercom
          to: "unlocked"
      condition:
        - condition: state
          entity_id: lock.r_intercom
          state: "unlocked"
        - condition: state
          entity_id: binary_sensor.c_ring_intercom_ding
          state: "on"
      action:
        - service: button.press
          target:
            entity_id: button.ring_intercom_open_door

    - alias: "[Intercom Lock] Unlock from mobile"
      mode: restart
      initial_state: true
      trigger:
        - platform: event
          event_type: ios.action_fired
          event_data:
            actionID: 4C4494D1-AB16-42AF-8B6B-5C5D998CC809
      actions:
        - action: button.press
          target:
            entity_id: button.ring_intercom_open_door
        - action: lock.unlock
          target:
            entity_id: lock.r_intercom
        - action: lock.unlock
          target:
            entity_id: lock.z_intercom
