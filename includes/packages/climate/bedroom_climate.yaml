bedroom_climate:
  timer:
    bedroom_sleep_mode_timer:
      name: "Начат процесс засыпания"
      duration: "01:00:10"

  alert:
    bedroom_co2_level:
      name: "Высокий уровень углекислого газа"
      message: >-
        😮‍💨 Высокий уровень CO2 в спальне:
        {{ states('sensor.c_bedroom_co2_density') }} ppm
        (threshold: {{ states('input_select.c_bedroom_co2_alert_level') }})
      done_message: >-
        ✅ Уровень CO2 в спальне в норме:
        {{ states('sensor.c_bedroom_co2_density') }} ppm
      entity_id: binary_sensor.c_bedroom_high_co2
      state: "on"
      repeat:
        - 5
        - 30
        - 60
      can_acknowledge: true
      skip_first: true
      notifiers:
        - tg_bot_valaz

  template:
    - fan:
        - name: Bedroom Turbine
          default_entity_id: fan.bedroom_turbine
          state: "{{ states('switch.bedroom_fan_plug') }}"
          turn_on:
            - target:
                entity_id:
                  - switch.bedroom_fan_plug
              action: switch.turn_on
          turn_off:
            - target:
                entity_id:
                  - switch.bedroom_fan_plug
              action: switch.turn_off
          percentage: >
            {% set power_fan_capacity = 13 %}
            {% set power_fan_and_heater_capacity = 350 %}
            {% set power_total_capacity = power_fan_capacity %}

            {% if is_state('switch.c_bedroom_fan_heater', 'on') %}
              {% set power_total_capacity = power_fan_and_heater_capacity %}
            {% else %}
              {% set power_total_capacity = power_fan_capacity %}
            {% endif %}

            {% set power_fan_current = states('sensor.bedroom_fan_plug_power') | float(0) %}
            {{ (100 * power_fan_current / power_total_capacity) | round(1) }}

    - binary_sensor:
        # =========================
        # HIGH CO2
        # =========================
        - name: "Bedroom High CO2"
          default_entity_id: binary_sensor.c_bedroom_high_co2
          state: >-
            {% set current = states('sensor.c_bedroom_co2_density') | float(0) %}
            {% set threshold = states('input_select.c_bedroom_co2_alert_level') | int(800) %}
            {{ current >= threshold }}

        # =========================
        # TARGET CO2 REACHED
        # =========================
        - name: "Bedroom Target CO2 Reached"
          default_entity_id: binary_sensor.c_bedroom_target_co2_reached
          state: >-
            {% set current = states('sensor.c_bedroom_co2_density') | float(0) %}
            {% set target = states('input_select.c_bedroom_target_co2_level') | int(500) %}
            {{ current <= target }}

    - sensor:
        - name: "Bedroom Turbine Last Mode"
          default_entity_id: sensor.c_bedroom_turbine_last_mode
          state: >
            {% if is_state('input_select.c_bedroom_turbine_mode', 'none')
              or is_state('input_select.c_bedroom_turbine_mode', 'sleep') %}
              {{ states('sensor.c_bedroom_turbine_last_mode') }}
            {% else %}
              {{ states('input_select.c_bedroom_turbine_mode') }}
            {% endif %}

        - name: "Bedroom Fan Heater Active Time"
          default_entity_id: sensor.c_bedroom_fan_heater_active_time
          unit_of_measurement: "min"
          state: >
            {% if is_state('switch.c_bedroom_fan_heater', 'on') %}
              {{ ((now() - states.switch.c_bedroom_fan_heater.last_changed).total_seconds() / 60) | round(1) }}
            {% else %}
              0
            {% endif %}

    - switch:
        - name: "Bedroom Fan Heater"
          default_entity_id: switch.c_bedroom_fan_heater
          icon: mdi:radiator

          state: >
            {{ is_state('switch.bedroom_heater_relay_l1', 'on')
              or is_state('switch.bedroom_heater_relay_l2', 'on') }}

          turn_on:
            - service: switch.turn_on
              target:
                entity_id: switch.bedroom_heater_relay_l1

          turn_off:
            - service: switch.turn_off
              target:
                entity_id:
                  - switch.bedroom_heater_relay_l1
                  - switch.bedroom_heater_relay_l2

  input_number:
    c_bedroom_target_temperature:
      name: Bedroom Target Temperature
      initial: 22
      min: 20
      max: 25
      step: 1

  input_select:
    c_bedroom_turbine_mode:
      name: Режим турбины
      options:
        - "none"
        - "recuperator"
        - "air conditioner"
        - "sleep"

    c_bedroom_circulator_mode:
      name: Режим циркулятора
      options:
        - "none"
        - "air conditioner"

    c_bedroom_target_co2_level:
      name: Bedroom Target CO2
      options:
        - "400"
        - "450"
        - "500"
        - "550"
        - "600"

    c_bedroom_co2_alert_level:
      name: Критический уровень CO2
      options:
        - "600"
        - "700"
        - "800"
        - "900"
        - "1000"

    c_bedroom_fan_heater_timeout:
      name: Fan Heater Timeout
      options:
        - "1"
        - "5"
        - "10"
        - "15"
        - "20"
        - "25"

  script:
    fix_main_heater_timeout:
      alias: "[Bedroom Climate] Fix Fan Heater Timeout"
      icon: mdi:delete-restore
      sequence:
        - choose:
            - conditions:
                - condition: numeric_state
                  entity_id: sensor.c_bedroom_temperature
                  below: 18
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.c_bedroom_fan_heater_timeout
                  data:
                    option: "15"
            - conditions:
                - condition: numeric_state
                  entity_id: sensor.c_bedroom_temperature
                  above: 18
                  below: 19
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.c_bedroom_fan_heater_timeout
                  data:
                    option: "10"
            - conditions:
                - condition: numeric_state
                  entity_id: sensor.c_bedroom_temperature
                  above: 19
                  below: 20
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.c_bedroom_fan_heater_timeout
                  data:
                    option: "5"
            - conditions:
                - condition: numeric_state
                  entity_id: sensor.c_bedroom_temperature
                  above: 20
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.c_bedroom_fan_heater_timeout
                  data:
                    option: "1"
          default: []

  automation:
    - alias: "[Bedroom Climate] Turn on Turbine on high CO2"
      trigger:
        - platform: state
          entity_id: binary_sensor.c_people_at_home
          to: "on"
        - platform: state
          entity_id: binary_sensor.c_bedroom_target_co2_reached
          to: "off"
        - platform: state
          entity_id: input_select.c_bedroom_turbine_mode
      condition:
        - condition: state
          entity_id: input_select.c_bedroom_turbine_mode
          state: "recuperator"
        - condition: state
          entity_id: fan.bedroom_turbine
          state: "off"
        - condition: state
          entity_id: binary_sensor.c_bedroom_target_co2_reached
          state: "off"
      action:
        - service: fan.turn_on
          target:
            entity_id: fan.bedroom_turbine

    - alias: "[Bedroom Climate] Turn off Turbine on low CO2"
      trigger:
        - platform: state
          entity_id: binary_sensor.c_bedroom_target_co2_reached
          to: "on"
          for: "00:10:00"
        - platform: state
          entity_id: input_select.c_bedroom_turbine_mode
      condition:
        - condition: state
          entity_id: input_select.c_bedroom_turbine_mode
          state: "recuperator"
        - condition: state
          entity_id: fan.bedroom_turbine
          state: "on"
        - condition: state
          entity_id: binary_sensor.c_bedroom_target_co2_reached
          state: "on"
      action:
        - service: fan.turn_off
          target:
            entity_id: fan.bedroom_turbine

    - alias: "[Bedroom Climate] Turn on Turbine on cool weather"
      trigger:
        - platform: state
          entity_id: sensor.c_weather_temperature
        - platform: state
          entity_id: sensor.c_bedroom_temperature
        - platform: state
          entity_id: input_select.c_bedroom_turbine_mode
      condition:
        - condition: state
          entity_id: fan.bedroom_turbine
          state: "off"
        - condition: state
          entity_id: input_select.c_bedroom_turbine_mode
          state: "air conditioner"
        - condition: template
          value_template: "{{ states('sensor.c_weather_temperature') < states('sensor.c_bedroom_temperature') }}"
      action:
        - service: fan.turn_on
          target:
            entity_id: fan.bedroom_turbine

    - alias: "[Bedroom Climate] Turn off Circulator on hot weather"
      trigger:
        - platform: state
          entity_id: sensor.c_weather_temperature
        - platform: state
          entity_id: sensor.c_bedroom_temperature
        - platform: state
          entity_id: input_select.c_bedroom_circulator_mode
      condition:
        - condition: state
          entity_id: fan.air_circulator
          state: "on"
        - condition: state
          entity_id: input_select.c_bedroom_circulator_mode
          state: "air conditioner"
        - condition: template
          value_template: "{{ states('sensor.c_weather_temperature') > states('sensor.c_bedroom_temperature') }}"
      action:
        - service: fan.turn_off
          target:
            entity_id: fan.air_circulator

    - alias: "[Bedroom Climate] Turn on Circulator on cool weather"
      trigger:
        - platform: state
          entity_id: sensor.c_weather_temperature
        - platform: state
          entity_id: sensor.c_bedroom_temperature
        - platform: state
          entity_id: input_select.c_bedroom_circulator_mode
      condition:
        - condition: state
          entity_id: fan.air_circulator
          state: "off"
        - condition: state
          entity_id: input_select.c_bedroom_circulator_mode
          state: "air conditioner"
        - condition: template
          value_template: "{{ states('sensor.c_weather_temperature') < states('sensor.c_bedroom_temperature') }}"
      action:
        - service: fan.turn_on
          target:
            entity_id: fan.air_circulator

    - alias: "[Bedroom Climate] Adjust Circulator Speed on bedroom temeperature"
      triggers:
        - platform: state
          entity_id: input_number.c_bedroom_target_temperature
        - platform: state
          entity_id: sensor.c_bedroom_temperature
        - platform: state
          entity_id: input_select.c_bedroom_circulator_mode
          to: "air conditioner"
          for: "00:00:03"
      conditions:
        - condition: state
          entity_id: fan.air_circulator
          state: "on"
        - condition: state
          entity_id: input_select.c_bedroom_circulator_mode
          state: "air conditioner"
      actions:
        - choose:
            - conditions:
                - condition: template
                  value_template: >
                    {{ states('sensor.c_bedroom_temperature') | float < states('input_number.c_bedroom_target_temperature') | float }}
              sequence:
                - service: fan.set_percentage
                  target:
                    entity_id: fan.air_circulator
                  data:
                    percentage: 25

            - conditions:
                - condition: template
                  value_template: >
                    {% set diff = states('sensor.c_bedroom_temperature') | float - states('input_number.c_bedroom_target_temperature') | float %}
                    {{ 0 <= diff < 1 }}
              sequence:
                - service: fan.set_percentage
                  target:
                    entity_id: fan.air_circulator
                  data:
                    percentage: 50

            - conditions:
                - condition: template
                  value_template: >
                    {% set diff = states('sensor.c_bedroom_temperature') | float - states('input_number.c_bedroom_target_temperature') | float %}
                    {{ 1 <= diff < 2 }}
              sequence:
                - service: fan.set_percentage
                  target:
                    entity_id: fan.air_circulator
                  data:
                    percentage: 75

            - conditions:
                - condition: template
                  value_template: >
                    {% set diff = states('sensor.c_bedroom_temperature') | float - states('input_number.c_bedroom_target_temperature') | float %}
                    {{ diff >= 2 }}
              sequence:
                - service: fan.set_percentage
                  target:
                    entity_id: fan.air_circulator
                  data:
                    percentage: 100

    - alias: "[Bedroom Climate] Turn off Turbine on hot weather"
      trigger:
        - platform: state
          entity_id: sensor.c_weather_temperature
        - platform: state
          entity_id: sensor.c_bedroom_temperature
        - platform: state
          entity_id: input_select.c_bedroom_turbine_mode
      condition:
        - condition: state
          entity_id: fan.bedroom_turbine
          state: "on"
        - condition: state
          entity_id: input_select.c_bedroom_turbine_mode
          state: "air conditioner"
        - condition: template
          value_template: "{{ states('sensor.c_weather_temperature') > states('sensor.c_bedroom_temperature') }}"
      action:
        - service: fan.turn_off
          target:
            entity_id: fan.bedroom_turbine

    - alias: "[Bedroom Climate] On Sleep Mode Started"
      trigger:
        - platform: state
          entity_id: input_select.c_bedroom_turbine_mode
          to: "sleep"
      action:
        - service: switch.turn_off
          target:
            entity_id: switch.bedroom_fan_plug
        - service: timer.cancel
          target:
            entity_id: timer.bedroom_sleep_mode_timer
        - service: timer.start
          target:
            entity_id: timer.bedroom_sleep_mode_timer

    - alias: "[Bedroom Climate] AutoCancel timer"
      trigger:
        - platform: state
          entity_id: input_select.c_bedroom_turbine_mode
          from: "sleep"
      action:
        - service: timer.cancel
          target:
            entity_id: timer.bedroom_sleep_mode_timer

    - alias: "[Bedroom Climate] On Sleep Mode Ended"
      trigger:
        - platform: state
          entity_id: timer.bedroom_sleep_mode_timer
          to: "idle"
      action:
        - service: input_select.select_option
          target:
            entity_id: input_select.c_bedroom_turbine_mode
          data:
            option: "{{states('sensor.c_bedroom_turbine_last_mode')}}"

    - alias: "[Bedroom Climate] Turn on Fan heater every 30 minutes"
      mode: single
      triggers:
        - platform: time_pattern
          minutes: "/30"
      conditions:
        - condition: state
          entity_id: switch.c_bedroom_fan_heater
          state: "off"
        - condition: numeric_state
          entity_id: sensor.c_bedroom_temperature
          below: 20
        - condition: state
          entity_id: input_select.c_bedroom_turbine_mode
          state: "recuperator"
      actions:
        - service: switch.turn_on
          target:
            entity_id: switch.c_bedroom_fan_heater

    - alias: "[Bedroom Climate] Turn off Fan heater after timeout"
      mode: single
      triggers:
        - platform: template
          value_template: >
            {{ states('sensor.c_bedroom_fan_heater_active_time') | float(0) >= states('input_select.c_bedroom_fan_heater_timeout') | float(0) }}
      conditions:
        - condition: state
          entity_id: switch.c_bedroom_fan_heater
          state: "on"
      actions:
        - service: switch.turn_off
          target:
            entity_id: switch.c_bedroom_fan_heater

    - alias: "[Bedroom Climate] Fix Heater timeout"
      trigger:
        - platform: state
          entity_id: sensor.c_bedroom_temperature
      action:
        - service: script.turn_on
          target:
            entity_id: script.fix_main_heater_timeout

    - alias: "[Bedroom Climate] When window is open"
      trigger:
        - platform: state
          entity_id: binary_sensor.bedroom_window_sensor_contact
          to: "on"
          for: "00:00:05"
      action:
        - service: input_select.select_option
          target:
            entity_id: input_select.c_bedroom_turbine_mode
          data:
            option: "none"
        - service: fan.turn_off
          target:
            entity_id: fan.bedroom_turbine
        - if:
            - condition: template
              value_template: "{{ states('sensor.c_weather_temperature') < states('sensor.c_bedroom_temperature') }}"
            - condition: template
              value_template: "{{ states('input_number.c_bedroom_target_temperature') < states('sensor.c_bedroom_temperature') }}"
          then:
            - service: input_select.select_option
              target:
                entity_id: input_select.c_bedroom_circulator_mode
              data:
                option: "air conditioner"
          else:
            - service: input_select.select_option
              target:
                entity_id: input_select.c_bedroom_circulator_mode
              data:
                option: "none"

    - alias: "[Bedroom Climate] When window is closed"
      trigger:
        - platform: state
          entity_id: binary_sensor.bedroom_window_sensor_contact
          to: "off"
          for: "00:00:05"
      action:
        - service: input_select.select_option
          target:
            entity_id: input_select.c_bedroom_circulator_mode
          data:
            option: "none"
        - service: fan.turn_off
          target:
            entity_id: fan.air_circulator
        - if:
            - condition: template
              value_template: "{{ states('sensor.c_weather_temperature') < states('sensor.c_bedroom_temperature') }}"
            - condition: template
              value_template: "{{ states('input_number.c_bedroom_target_temperature') < states('sensor.c_bedroom_temperature') }}"
          then:
            - service: input_select.select_option
              target:
                entity_id: input_select.c_bedroom_turbine_mode
              data:
                option: "air conditioner"
          else:
            - service: input_select.select_option
              target:
                entity_id: input_select.c_bedroom_turbine_mode
              data:
                option: "none"
