syncthing:
  template:
    - sensor:
        # =========================
        # MOVIES
        # =========================

        - name: "Syncthing Hulk Downloads Movies Progress"
          default_entity_id: sensor.c_syncthing_hulk_downloads_movies_progress
          unit_of_measurement: "%"
          icon: mdi:list-status
          state: >-
            {% set s = state_attr('sensor.u5elrlu_media_downloads_movies_media_downloads_movies', 'in_sync_bytes') | float(0) %}
            {% set g = state_attr('sensor.u5elrlu_media_downloads_movies_media_downloads_movies', 'global_bytes') | float(0) %}
            {{ (s / g * 100) | round(2) if g > 0 else 0 }}

        - name: "Syncthing Hulk Downloads Movies Need Files"
          default_entity_id: sensor.c_syncthing_hulk_downloads_movies_need_files
          unit_of_measurement: "files"
          icon: mdi:folder-arrow-down
          state: >-
            {{ state_attr('sensor.u5elrlu_media_downloads_movies_media_downloads_movies', 'need_files') | int(0) }}

        - name: "Syncthing Hulk Downloads Movies Need GB"
          default_entity_id: sensor.c_syncthing_hulk_downloads_movies_need_gb
          unit_of_measurement: "GiB"
          icon: mdi:harddisk-plus
          state: >-
            {% set b = state_attr('sensor.u5elrlu_media_downloads_movies_media_downloads_movies', 'need_bytes') | float(0) %}
            {{ (b / 1024 / 1024 / 1024) | round(2) }}

        # =========================
        # TRAVEL MEDIA
        # =========================

        - name: "Syncthing Hulk Travel Media Progress"
          default_entity_id: sensor.c_syncthing_hulk_travel_media_progress
          unit_of_measurement: "%"
          icon: mdi:list-status
          state: >-
            {% set s = state_attr('sensor.u5elrlu_media_travel_media_travel', 'in_sync_bytes') | float(0) %}
            {% set g = state_attr('sensor.u5elrlu_media_travel_media_travel', 'global_bytes') | float(0) %}
            {{ (s / g * 100) | round(2) if g > 0 else 0 }}

        - name: "Syncthing Hulk Travel Media Need Files"
          default_entity_id: sensor.c_syncthing_hulk_travel_media_need_files
          unit_of_measurement: "files"
          icon: mdi:folder-arrow-down
          state: >-
            {{ state_attr('sensor.u5elrlu_media_travel_media_travel', 'need_files') | int(0) }}

        - name: "Syncthing Hulk Travel Media Need GB"
          default_entity_id: sensor.c_syncthing_hulk_travel_media_need_gb
          unit_of_measurement: "GiB"
          icon: mdi:harddisk-plus
          state: >-
            {% set b = state_attr('sensor.u5elrlu_media_travel_media_travel', 'need_bytes') | float(0) %}
            {{ (b / 1024 / 1024 / 1024) | round(2) }}