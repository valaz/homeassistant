hallway_zigbee_intercom:
  timer:
    hallway_intercom_state_timer:
      name: "Запущено открытие подъезда"
      duration: "00:00:02"

  template:
    - binary_sensor:
        - name: "Should Warmup Intercom Door"
          default_entity_id: binary_sensor.c_should_warmup_intercom_door

          state: >-
            {% set last_changed = states.lock.z_intercom.last_changed %}
            {% set threshold = now() - timedelta(hours=154) %}

            {{
              last_changed is not none
              and as_timestamp(last_changed) < as_timestamp(threshold)
            }}

    - lock:
        - unique_id: z_intercom
          name: Z Intercom
          lock:
            - target:
                entity_id:
                  - timer.hallway_intercom_state_timer
              action: timer.cancel
          unlock:
            - action: script.intercom_door_try_warmup
            - target:
                entity_id:
                  - switch.hallway_button_pusher
              action: switch.toggle
          optimistic: false
          state: "{{ is_state('timer.hallway_intercom_state_timer', 'idle') }}"

  script:
    intercom_door_try_warmup:
      alias: "[Intercom Lock] Try to warmup"
      sequence:
        - if:
            - condition: template
              value_template: "{{ is_state('binary_sensor.c_should_warmup_intercom_door', 'on')}}"
          then:
            - service: script.intercom_door_single_warmup
            - service: script.intercom_door_single_warmup
            - service: script.intercom_door_single_warmup
            - service: script.intercom_door_single_warmup
            - service: script.intercom_door_single_warmup

    intercom_door_single_warmup:
      alias: "[Intercom Lock] Single warmup"
      sequence:
        - service: switch.toggle
          target:
            entity_id: switch.hallway_button_pusher
        - delay: "00:00:03"

  automation:
    - alias: "[Intercom Lock] Observe button push"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: switch.hallway_button_pusher
          from:
            - "off"
            - "on"
          to:
            - "off"
            - "on"
      action:
        - service: timer.cancel
          target:
            entity_id: timer.hallway_intercom_state_timer
        - service: timer.start
          target:
            entity_id: timer.hallway_intercom_state_timer
