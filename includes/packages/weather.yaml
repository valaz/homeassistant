weather:
  template:
    - sensor:
        - name: "Weather Humidity"
          default_entity_id: sensor.c_weather_humidity
          unit_of_measurement: "%"
          device_class: humidity
          state_class: measurement
          state: >
            {{ state_attr('weather.pirateweather', 'humidity') | float(0) | round(0) }}
          availability: >
            {{ state_attr('weather.pirateweather', 'humidity') is not none }}

        - name: "Weather Temperature"
          default_entity_id: sensor.c_weather_temperature
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          state: >
            {{ state_attr('weather.pirateweather', 'temperature') | float(0) | round(1) }}
          availability: >
            {{ state_attr('weather.pirateweather', 'temperature') is not none }}

        - name: "Sun Elevation"
          default_entity_id: sensor.c_sun_elevation
          unit_of_measurement: "°"
          state_class: measurement
          icon: mdi:weather-sunny
          state: >
            {{ state_attr('sun.sun', 'elevation') | float(0) | round(1) }}
          availability: >
            {{ state_attr('sun.sun', 'elevation') is not none }}