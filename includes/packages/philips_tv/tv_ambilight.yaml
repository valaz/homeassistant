tv_ambilight:
  template:
    - switch:
        - name: "65OLED936 12 Ambilight"
          default_entity_id: switch.c_65oled936_12_ambilight
          icon: mdi:television-ambient-light
          state: >
            {{ is_state('light.65oled936_12_ambilight', 'on') }}
          turn_on:
            - service: light.turn_on
              target:
                entity_id: light.65oled936_12_ambilight
          turn_off:
            - service: light.turn_off
              target:
                entity_id: light.65oled936_12_ambilight

        - name: "65OLED936 12 Ambilight Hue"
          default_entity_id: switch.c_65oled936_12_ambilight_hue
          icon: mdi:wall-sconce-round
          state: >
            {{ is_state('switch.65oled936_12_ambilight_hue', 'on') }}
          turn_on:
            - service: switch.turn_on
              target:
                entity_id: switch.65oled936_12_ambilight_hue
          turn_off:
            - service: switch.turn_off
              target:
                entity_id: switch.65oled936_12_ambilight_hue

        - name: "65OLED936 12 Screen State"
          default_entity_id: switch.c_65oled936_12_screen_state
          icon: >
            {% if is_state('switch.65oled936_12_screen_state', 'on') %}
              mdi:monitor
            {% else %}
              mdi:monitor-off
            {% endif %}
          state: >
            {% set tv_on = is_state('switch.c_livingroom_tv_power', 'on') %}
            {% set screen = is_state('switch.65oled936_12_screen_state', 'on') %}
            {{ tv_on and screen }}
          turn_on:
            - service: switch.turn_on
              target:
                entity_id:
                  - switch.c_livingroom_tv_power
                  - switch.65oled936_12_screen_state
          turn_off:
            - service: switch.turn_off
              target:
                entity_id: switch.65oled936_12_screen_state
