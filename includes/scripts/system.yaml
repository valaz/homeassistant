host_reboot:
  alias: "[System] Host Reboot"
  icon: mdi:restart-alert
  sequence:
    - service: hassio.host_reboot

homeassistant_restart:
  alias: "[System] Restart Home Assistant"
  icon: mdi:restart
  sequence:
    - service: homeassistant.restart

homeassistant_core_update:
  alias: "[System] Home Assistant Core Update"
  icon: mdi:update
  sequence:
    - service: update.install
      data:
        backup: true
      target:
        entity_id: update.home_assistant_core_update

homeassistant_supervisor_update:
  alias: "[System] Supervisor Update"
  icon: mdi:update
  sequence:
    - service: update.install
      data:
        backup: true
      target:
        entity_id: update.home_assistant_supervisor_update

bluetooth_restart:
  icon: mdi:bluetooth
  alias: "[System] Restart Bluetooth"
  sequence:
    - service: shell_command.bluetooth_power_off
    - delay: "00:00:05"
    - service: shell_command.bluetooth_power_on

automation_reload:
  alias: "[System] Automation Reload"
  icon: mdi:reload
  sequence:
    - service: automation.reload
