tv_time_tracker:
  timer:
    tv_rescan:
      name: "Проверка телевизора через через "
      duration: "00:01:00"

  input_number:
    # tv_duration_today:
    #   name: TV Duration today
    #   min: 0
    #   max: 1440
    #   step: 1
    #   unit_of_measurement: min
    tv_duration_current:
      name: TV Duration current
      min: 0
      max: 1440
      step: 1
      unit_of_measurement: min
    tv_max_duration_today:
      name: TV Max Duration for today
      initial: 120
      min: 60
      max: 720
      step: 60
      unit_of_measurement: min

  template:
    - binary_sensor:
        - name: "TV Plex"
          default_entity_id: binary_sensor.c_tv_plex
          device_class: running
          state: >
            {{ state_attr('media_player.apple_tv_4k', 'app_name') == 'Plex' }}

    - sensor:
        - name: "TV Duration Today"
          default_entity_id: sensor.c_tv_duration_today
          unit_of_measurement: min
          state: >
            {{ (states('sensor.tv_enabled_today') | float(0)) * 60 }}

        - name: "TV Duration Current"
          default_entity_id: sensor.c_tv_duration_current
          unit_of_measurement: min
          state: >
            {{ states('input_number.tv_duration_current') | float(0) }}

        - name: "TV Enabled Today Formatted"
          default_entity_id: sensor.tv_enabled_today_formatted
          state: >
            {% set hours = states('sensor.tv_enabled_today') | float(0) %}
            {% set hr = hours | int %}
            {% set min = ((hours - hr) * 60) | int %}
            {{ "%d:%02d" | format(hr, min) }}
          icon: mdi:television-clock

  sensor:
    - platform: history_stats
      name: TV Enabled Today
      entity_id: media_player.apple_tv_4k
      state: "playing"
      type: time
      start: "{{ today_at() }}"
      end: "{{ now() }}"

  automation:
    - alias: "[TV Time] Refresh Duration"
      trigger:
        - platform: state
          entity_id: media_player.apple_tv_4k
          to: "playing"
        - platform: state
          entity_id: switch.c_65oled936_12_screen_state
          to: "on"
        - platform: event
          event_type: timer.finished
          event_data:
            entity_id: timer.tv_rescan
      condition:
        - condition: state
          entity_id: media_player.apple_tv_4k
          state: "playing"
      action:
        # - action: input_number.increment
        #   target:
        #     entity_id: input_number.tv_duration_today
        - action: input_number.increment
          target:
            entity_id: input_number.tv_duration_current
        - service: timer.start
          target:
            entity_id: timer.tv_rescan

    - alias: "[TV Time] Reset Current Duration"
      trigger:
        - platform: state
          entity_id: media_player.philips_tv
          to: "off"
        - platform: state
          entity_id: switch.c_65oled936_12_screen_state
          to: "off"
      action:
        - service: input_number.set_value
          target:
            entity_id: input_number.tv_duration_current
          data:
            value: "{{ 0 }}"
        - service: timer.cancel
          target:
            entity_id: timer.tv_rescan

    - alias: "[TV Time] Reset Today Duration"
      trigger:
        - platform: time
          at: "00:00:00"
      action:
        # - service: input_number.set_value
        #   target:
        #     entity_id: input_number.tv_duration_today
        #   data:
        #     value: "{{ 0 }}"
        - service: input_number.set_value
          target:
            entity_id: input_number.tv_max_duration_today
          data:
            value: "{{ 120 }}"

    - alias: "[TV Time] Every 15m After 120m Daily"
      trigger:
        - platform: time_pattern
          minutes: "/15"
      condition:
        - condition: template
          value_template: "{{ states('sensor.c_tv_duration_today')|int >= states('input_number.tv_max_duration_today')|int }}"
        - condition: template
          value_template: "{{ states('sensor.c_tv_duration_current')|int >= 10 }}"
        - condition: state
          entity_id: media_player.apple_tv_4k
          state: "playing"
      actions:
        - service: notify.mobile_app_iphone_15_az
          data:
            message: "📺 Сегодня уже {{ states('sensor.c_tv_duration_today')|int }} мин ТВ. Каждые 15 минут напоминаю: может хватит? 🙂"
        - action: media_player.media_pause
          target:
            entity_id:
              - media_player.apple_tv_4k
        - action: tts.google_say
          data:
            entity_id: media_player.nest_hub
            language: ru
            message: "Ты смотришь телевизор уже {{ states('sensor.tv_enabled_today_formatted') }}"

    - alias: "[TV Time] Late Night Warning"
      trigger:
        - platform: time_pattern
          minutes: "/5"
      condition:
        - condition: time
          after: "00:00:00"
          before: "06:00:00"
        - condition: state
          entity_id: media_player.apple_tv_4k
          state: "playing"
      action:
        - service: notify.mobile_app_iphone_15_az
          data:
            message: "🌙 Уже поздно. ТВ сейчас = минус сон. Выключаем?"
        - action: media_player.media_pause
          target:
            entity_id:
              - media_player.apple_tv_4k
