people:
  template:
    - binary_sensor:
        - name: "People At Home"
          default_entity_id: binary_sensor.c_people_at_home
          unique_id: c_people_at_home
          state: >
            {{ is_state('person.azat', 'home') or is_state('person.eliia', 'home') }}
          device_class: presence

        - name: "Bedroom Closet Usage"
          default_entity_id: binary_sensor.c_bedroom_closet_usage
          unique_id: c_bedroom_closet_usage
          state: >
            {{ is_state('binary_sensor.bedroom_closet_motion_sensor_occupancy', 'on') }}
          device_class: motion
          delay_off:
            minutes: 5

  automation:
    - alias: "[People] When Azat came home"
      mode: restart
      initial_state: true
      trigger:
        - platform: state
          entity_id: person.azat
          to: "home"
      action:
        - service: switch.turn_on
          target:
            entity_id: switch.passat_gte_force_data_refresh

    - alias: "[People] Check Azat for keys"
      trigger:
        - platform: state
          entity_id: binary_sensor.hallway_door_sensor_contact
          to: "on"
      condition:
        condition: and
        conditions:
          - condition: state
            entity_id: person.azat
            state: "home"
          - condition: state
            entity_id: binary_sensor.c_bedroom_closet_usage
            state: "on"
      action:
        - delay: "00:00:01"
        - service: script.turn_on
          target:
            entity_id: script.1679826687505
